<!DOCTYPE html>
<html class="light">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="/src/css/global.css" rel="stylesheet">
    <link href="/src/css/app.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
    <script type="module">
      import '@material/web/all.js';
      import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
</head>
<body>
        <header>
        <div class="header-top">
            <h1 class="logo">Clutter</h1>
            <div class="header-actions">
                <md-icon-button id="settings-btn">
                    <md-icon>settings</md-icon>
                </md-icon-button>
                <md-icon-button>
                    <md-icon>account_circle</md-icon>
                </md-icon-button>
            </div>
        </div>
        <md-tabs>
            <md-primary-tab id="tab-summary">
                <md-icon slot="icon">dashboard</md-icon>
                Summary
            </md-primary-tab>
            <md-primary-tab id="tab-tasks">
                <md-icon slot="icon">pending_actions</md-icon>
                Tasks
            </md-primary-tab>
            <md-primary-tab id="tab-guides">
                <md-icon slot="icon">developer_guide</md-icon>
                Guides
            </md-primary-tab>
        </md-tabs>
    </header>
    <main>

        <!-- Content areas -->
        <div class="content-area">
            <div id="summary" class="page">
                <p>The summary page</p>
            </div>
            <div id="tasks" class="page">
                <p>The tasks page</p>
            </div>
            <div id="guides" class="page">
                guides page
            </div>
        </div>

        <!-- Settings modal -->
        <md-dialog id="settings-modal">
            <div slot="headline">Settings</div>
            <form slot="content">
                <!-- Settings form here -->
            </form>
        </md-dialog>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
