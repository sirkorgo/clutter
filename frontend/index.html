<!DOCTYPE html>
<html class="light">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link href="/src/css/global.css" rel="stylesheet">
    <link href="/src/css/app.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
    <script type="module">
      import '@material/web/all.js';
      import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
</head>
<body>
        <header>
        <div class="header-top">
            <h1 class="logo">Clutter</h1>
            <div class="header-actions">
                <md-icon-button id="settings-btn">
                    <md-icon>settings</md-icon>
                </md-icon-button>
                <md-icon-button>
                    <md-icon>account_circle</md-icon>
                </md-icon-button>
            </div>
        </div>
    </header>
    <main>

        <!-- Content areas -->
        <div class="content-area">
            <div id="summary" class="page">
                <p>The summary page</p>
            </div>
            <div id="tasks" class="page">
                <h1 style="margin-top: 0;">Tasks</h1>
                <span class="task-toolbar">
                <md-fab id="new-task-btn" label="New Task">
                <md-icon slot="icon">add</md-icon>
                </md-fab>
                <span class="filter-selector">
                <md-chip-set id="task-filters">
                    <md-filter-chip label="Incomplete"></md-filter-chip>
                    <md-filter-chip label="Completed"></md-filter-chip>
                </md-chip-set>
                <md-chip-set id="task-type">
                    <md-filter-chip label="Canvas"></md-filter-chip>
                    <md-filter-chip label="Clutter"></md-filter-chip>
                </md-chip-set>
                </span>
                </span>
                <section id="taskList">
                </section>
            </div>
            <div id="guides" class="page">
                guides page
            </div>
        </div>

        <!-- Settings modal -->
        <md-dialog id="settings-modal">
            <div slot="headline">Settings</div>
            <form slot="content">
                <!-- Settings form here -->
            </form>
        </md-dialog>
    </main>
    <md-dialog id="delete-confirm">
        <div slot="headline">Delete Task?</div>
        <div slot="content">This can't be undone.</div>
        <div slot="actions">
            <md-text-button id="delete-cancel">Cancel</md-text-button>
            <md-filled-button id="delete-confirm-btn">Delete</md-filled-button>
        </div>
    </md-dialog>
    <script src="app.js"></script>
</body>
<md-tabs>
            <md-primary-tab id="tab-summary">
                <md-icon slot="icon">dashboard</md-icon>
                Summary
            </md-primary-tab>
            <md-primary-tab id="tab-tasks">
                <md-icon slot="icon">pending_actions</md-icon>
                Tasks
            </md-primary-tab>
            <md-primary-tab id="tab-guides">
                <md-icon slot="icon">developer_guide</md-icon>
                Guides
            </md-primary-tab>
        </md-tabs>
</html>
